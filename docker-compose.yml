services:
  db:
    image: postgres:16-alpine
    container_name: appservicios_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=AppServicios_Pass_123!
      - POSTGRES_DB=AppServiciosDb
    ports:
      - "5432:5432"
    volumes:
      - appservicios_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: ./AppServicios.Api
      dockerfile: Dockerfile
    container_name: appservicios_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=AppServiciosDb;Username=postgres;Password=AppServicios_Pass_123!
      - Jwt__Key=${JWT_KEY:?Configura JWT_KEY con un secreto productivo}
      - Cors__AllowedOrigins__0=${APP_PUBLIC_URL:?Configura APP_PUBLIC_URL con el dominio público}
      - MercadoPago__AccessToken=${MERCADOPAGO_ACCESS_TOKEN:-}
      - MercadoPago__PublicKey=${MERCADOPAGO_PUBLIC_KEY:-}
      - MercadoPago__UseSandbox=${MERCADOPAGO_USE_SANDBOX:-false}
      - MercadoPago__SuccessUrl=${APP_PUBLIC_URL}/pago-resultado.html?status=success
      - MercadoPago__FailureUrl=${APP_PUBLIC_URL}/pago-resultado.html?status=failure
      - MercadoPago__PendingUrl=${APP_PUBLIC_URL}/pago-resultado.html?status=pending
      - VAPID__PublicKey=${VAPID_PUBLIC_KEY:-}
      - VAPID__PrivateKey=${VAPID_PRIVATE_KEY:-}
      - VAPID__Subject=${VAPID_SUBJECT:-mailto:admin@appservicios.com}
    ports:
      - "5000:8080" # ASP.NET Core 8 utiliza el puerto 8080 por defecto
    depends_on:
      - db
    restart: unless-stopped

volumes:
  appservicios_db_data:
