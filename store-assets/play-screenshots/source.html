<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SERVILABS Play Screenshots</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: #07111f;
      color: #f8fbff;
    }
    .screen {
      width: 1080px;
      height: 1920px;
      padding: 70px 64px;
      display: flex;
      flex-direction: column;
      gap: 38px;
      background:
        linear-gradient(180deg, rgba(0, 83, 213, .92), rgba(7, 17, 31, .98) 52%),
        radial-gradient(circle at 82% 8%, rgba(21, 210, 184, .34), transparent 34%),
        #07111f;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 22px;
      min-width: 0;
    }
    .brand img {
      width: 104px;
      height: 104px;
      border-radius: 28px;
      box-shadow: 0 22px 56px rgba(0, 0, 0, .32);
    }
    .brand strong {
      display: block;
      font-size: 44px;
      line-height: 1;
      letter-spacing: 0;
    }
    .brand span {
      display: block;
      margin-top: 8px;
      color: #b9d4ff;
      font-size: 22px;
    }
    .pill {
      padding: 18px 24px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 999px;
      color: #d9f8ff;
      font-size: 22px;
      background: rgba(255,255,255,.09);
      white-space: nowrap;
    }
    h1 {
      margin: 44px 0 0;
      max-width: 920px;
      font-size: 76px;
      line-height: 1.02;
      letter-spacing: 0;
    }
    .lead {
      margin: 0;
      max-width: 900px;
      color: #dbeafe;
      font-size: 32px;
      line-height: 1.38;
    }
    .hero-image {
      width: 100%;
      aspect-ratio: 1.2;
      border-radius: 32px;
      object-fit: cover;
      box-shadow: 0 30px 90px rgba(0,0,0,.34);
      border: 1px solid rgba(255,255,255,.18);
    }
    .panel {
      background: rgba(255,255,255,.96);
      color: #0b1b32;
      border-radius: 28px;
      padding: 34px;
      box-shadow: 0 24px 70px rgba(0,0,0,.28);
    }
    .panel.dark {
      background: rgba(8, 22, 43, .92);
      color: #f8fbff;
      border: 1px solid rgba(255,255,255,.14);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }
    .card {
      min-height: 186px;
      padding: 26px;
      border-radius: 22px;
      background: #eef6ff;
      border: 1px solid #cfe2ff;
    }
    .card strong, .job strong, .chat strong {
      display: block;
      font-size: 30px;
      line-height: 1.08;
      letter-spacing: 0;
    }
    .card strong {
      color: #0b1b32;
    }
    .card span, .job span, .chat span {
      display: block;
      margin-top: 12px;
      color: #44607d;
      font-size: 22px;
      line-height: 1.32;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 76px;
      padding: 0 34px;
      border-radius: 20px;
      background: #13cdb8;
      color: #06101f;
      font-size: 28px;
      font-weight: 800;
    }
    .search {
      display: flex;
      align-items: center;
      min-height: 92px;
      padding: 0 28px;
      border-radius: 24px;
      background: #fff;
      color: #687a91;
      font-size: 28px;
      box-shadow: inset 0 0 0 1px #d9e7f8;
    }
    .job-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .job {
      padding: 26px;
      border-radius: 24px;
      background: #f6fbff;
      border: 1px solid #d7e8ff;
      color: #0b1b32;
    }
    .job .meta {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 18px;
      color: #007a70;
      font-size: 21px;
      font-weight: 700;
    }
    .map {
      height: 520px;
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(19,205,184,.28), rgba(0,87,215,.26)),
        repeating-linear-gradient(45deg, rgba(255,255,255,.18), rgba(255,255,255,.18) 2px, transparent 2px, transparent 42px),
        #e7f1fb;
      position: relative;
      overflow: hidden;
    }
    .pin {
      position: absolute;
      width: 72px;
      height: 72px;
      border-radius: 50% 50% 50% 6px;
      transform: rotate(-45deg);
      background: #0057d7;
      box-shadow: 0 16px 40px rgba(0,87,215,.28);
    }
    .pin::after {
      content: "";
      position: absolute;
      inset: 22px;
      border-radius: 50%;
      background: #fff;
    }
    .pin.one { left: 180px; top: 160px; }
    .pin.two { right: 170px; top: 250px; background: #13cdb8; }
    .pin.three { left: 470px; bottom: 112px; background: #0b1b32; }
    .chat {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .bubble {
      max-width: 76%;
      padding: 24px 26px;
      border-radius: 24px;
      background: #eef6ff;
      color: #0b1b32;
      font-size: 25px;
      line-height: 1.34;
    }
    .bubble.me {
      align-self: flex-end;
      background: #13cdb8;
      color: #06101f;
      font-weight: 700;
    }
    .asi {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 24px;
      border-radius: 24px;
      background: rgba(19,205,184,.12);
      border: 1px solid rgba(19,205,184,.38);
    }
    .asi img {
      width: 76px;
      height: 76px;
      border-radius: 50%;
    }
    .asi strong {
      display: block;
      font-size: 26px;
      line-height: 1.15;
      color: inherit;
    }
    .asi span {
      display: block;
      margin-top: 8px;
      color: inherit;
      opacity: .86;
      font-size: 21px;
      line-height: 1.28;
    }
    .kpis {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 18px;
    }
    .kpi {
      padding: 24px;
      border-radius: 22px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
    }
    .kpi strong {
      display: block;
      font-size: 34px;
    }
    .kpi span {
      display: block;
      margin-top: 8px;
      color: #b9d4ff;
      font-size: 20px;
    }
    .footer-note {
      margin-top: auto;
      color: #a8c7f7;
      font-size: 22px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <main class="screen" id="screen"></main>
  <script>
    const logo = '../servilabs-play-icon-512.png';
    const hero = '../../AppServicios.Api/wwwroot/servilabs-hero-workers.jpg';
    const asi = '../../AppServicios.Api/wwwroot/ia-avatar.png';
    const params = new URLSearchParams(location.search);
    const currentScreen = params.get('screen') || '1';
    const root = document.getElementById('screen');
    const headerMarkup = '<div class="top"><div class="brand"><img src="' + logo + '"><div><strong>SERVILABS</strong><span>Servicios laborales verificados</span></div></div><div class="pill">App segura</div></div>';
    const screens = {
      '1': headerMarkup + `
        <h1>Trabajo real, cerca y con más seguridad.</h1>
        <p class="lead">Clientes y profesionales conectan por rubro, ubicación, chat y pagos protegidos desde una sola app.</p>
        <img class="hero-image" src="${hero}">
        <div class="grid">
          <div class="card"><strong>Oficios visibles</strong><span>Plomería, electricidad, cuidado, cocina, gas, limpieza y más.</span></div>
          <div class="card"><strong>Identidad cuidada</strong><span>Registro, alertas y validaciones para reducir fraude.</span></div>
        </div>
        <div class="cta">Empezar en SERVILABS</div>
        <p class="footer-note">La imagen de marca elegida ya identifica la experiencia mobile y Play Console.</p>
      `,
      '2': headerMarkup + `
        <h1>Pedí un servicio en minutos.</h1>
        <p class="lead">Publicá qué necesitás, elegí urgencia y presupuesto, y SERVILABS avisa a profesionales del rubro.</p>
        <div class="panel">
          <div class="search">Buscar: electricista, plomero, enfermería...</div>
          <div style="height:24px"></div>
          <div class="grid">
            <div class="card"><strong>Electricidad</strong><span>Instalaciones, cortes y mantenimiento.</span></div>
            <div class="card"><strong>Plomería</strong><span>Pérdidas, baños, cocina y urgencias.</span></div>
            <div class="card"><strong>Cuidados</strong><span>Acompañamiento y asistencia domiciliaria.</span></div>
            <div class="card"><strong>Gastronomía</strong><span>Cocina, eventos y producción diaria.</span></div>
          </div>
        </div>
        <div class="panel dark">
          <div class="asi"><img src="${asi}"><div><strong>ASI te orienta</strong><span>La IA ayuda a clasificar el rubro y escribir una solicitud clara.</span></div></div>
        </div>
      `,
      '3': headerMarkup + `
        <h1>Mapa vivo para contratar cerca.</h1>
        <p class="lead">Ubicá solicitudes y profesionales por zona, radio de atención y disponibilidad.</p>
        <div class="panel">
          <div class="map"><div class="pin one"></div><div class="pin two"></div><div class="pin three"></div></div>
        </div>
        <div class="kpis">
          <div class="kpi"><strong>3 km</strong><span>Profesional cercano</span></div>
          <div class="kpi"><strong>Hoy</strong><span>Urgencia visible</span></div>
          <div class="kpi"><strong>Seguro</strong><span>Datos protegidos</span></div>
        </div>
        <p class="footer-note">Pensada para celulares: lectura rápida, ubicación y decisiones claras.</p>
      `,
      '4': headerMarkup + `
        <h1>Alertas de trabajo para profesionales.</h1>
        <p class="lead">Cuando un cliente publica una necesidad, los profesionales del rubro reciben aviso en la app y en el teléfono.</p>
        <div class="panel job-list">
          <div class="job"><strong>ASI encontró un trabajo para vos</strong><span>Cliente necesita electricista para instalación domiciliaria.</span><div class="meta"><b>Rubro: Electricidad</b><b>Presupuesto ARS 35.000</b></div></div>
          <div class="job"><strong>Solicitud cercana</strong><span>Trabajo a 4 km, con chat disponible y estado pendiente.</span><div class="meta"><b>Responder ahora</b><b>Pago protegido futuro</b></div></div>
          <div class="job"><strong>Perfil profesional</strong><span>Mostrá experiencia, radio de trabajo, tarifa y disponibilidad.</span><div class="meta"><b>Verificado</b><b>Notificaciones activas</b></div></div>
        </div>
        <div class="cta">Aceptar solicitud</div>
      `,
      '5': headerMarkup + `
        <h1>Chat, ASI y pagos coordinados.</h1>
        <p class="lead">Conversaciones internas, ayuda de IA y flujo preparado para pagos seguros entre partes.</p>
        <div class="panel chat">
          <div class="bubble">Necesito reparar una pérdida hoy. ¿Podés pasar presupuesto?</div>
          <div class="bubble me">Sí, puedo ir por la tarde. Te paso detalle y materiales.</div>
          <div class="asi"><img src="${asi}"><div><strong>ASI acompaña el flujo</strong><span>Ayuda a ordenar mensajes, rubros, seguridad y próximos pasos.</span></div></div>
          <div class="bubble">Pago coordinado con trazabilidad y comisión mínima del 2%.</div>
        </div>
        <div class="grid">
          <div class="card"><strong>Mercado Pago</strong><span>Alta, mensualidad y pagos preparados.</span></div>
          <div class="card"><strong>Open Gateway</strong><span>Sandbox para verificación móvil antifraude.</span></div>
        </div>
      `
    };
    root.innerHTML = screens[currentScreen] || screens['1'];
  </script>
</body>
</html>
